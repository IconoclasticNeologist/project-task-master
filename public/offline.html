<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FAF7EF" />
    <title>Offline — Tend</title>
    <!--
      Self-contained calm offline shell. The service worker serves this as the navigation
      fallback so the installed PWA opens instantly offline with no white flash. Inline styles
      (matching the app's calm baseline tokens) keep it robust with zero network dependency.
    -->
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        display: flex; align-items: center; justify-content: center;
        min-height: 100%; padding: 1.5rem;
        background: #FAF7EF; color: #2C2A26;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        line-height: 1.7; letter-spacing: 0.005em; -webkit-font-smoothing: antialiased;
      }
      main { max-width: 28rem; text-align: center; }
      h1 { font-size: 1.5rem; font-weight: 400; letter-spacing: -0.005em; margin: 0 0 0.75rem; }
      p { margin: 0; color: #5B5750; }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>Your information is safe on this device. Reopen when you have a connection — nothing is lost.</p>
    </main>
  </body>
</html>
