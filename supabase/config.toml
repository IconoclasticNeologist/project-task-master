# Supabase config for The Advocate.
# Minimal, hand-authored. If a newer CLI wants a different shape, run `supabase init`
# to regenerate — migrations are independent of this file.
project_id = "the-advocate"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
# Make extension types (vector, pgcrypto) resolvable to PostgREST.
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"

[storage]
enabled = true

[realtime]
enabled = true
